<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — Anchor: ADHD</title>
  <meta name="description" content="Support for Anchor: ADHD." />
  <style>
    :root {
      --bg: #FFF8F5;
      --text: #1A1A1A;
      --text-secondary: #6B6B6B;
      --coral: #FF6B35;
      --teal: #0D9BAB;
      --border: rgba(0, 0, 0, 0.10);
    }
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      line-height: 1.65;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--coral); text-decoration: none; }
    a:hover { text-decoration: underline; }

    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 18px 24px;
      background: var(--coral);
      flex-wrap: wrap;
      gap: 12px;
    }
    .brand {
      font-weight: 800;
      font-size: 18px;
      color: #FFFFFF;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .brand a { color: #FFFFFF; }
    .brand a:hover { text-decoration: none; }
    .brand .mark { font-size: 22px; }
    nav a {
      color: rgba(255, 255, 255, 0.92);
      font-size: 14px;
      font-weight: 600;
      margin-left: 20px;
    }
    nav a:hover { color: #FFFFFF; text-decoration: none; }

    main {
      flex: 1;
      width: 100%;
      max-width: 760px;
      margin: 0 auto;
      padding: 48px 24px;
    }
    h1 {
      font-size: 32px;
      font-weight: 800;
      margin-bottom: 8px;
    }
    .updated {
      color: var(--text-secondary);
      font-size: 14px;
      margin-bottom: 36px;
    }
    .intro {
      color: var(--text-secondary);
      margin-bottom: 32px;
    }
    section { margin-bottom: 30px; }
    h2 {
      font-size: 19px;
      font-weight: 700;
      color: var(--coral);
      margin-bottom: 10px;
    }
    p { color: var(--text); margin-bottom: 10px; }
    ul { color: var(--text); padding-left: 22px; margin-bottom: 10px; }
    li { margin-bottom: 6px; }
    strong { color: var(--text); font-weight: 700; }

    footer {
      background: var(--teal);
      padding: 28px 24px;
      text-align: center;
      color: #FFFFFF;
      font-size: 14px;
    }
    footer .links { margin-bottom: 10px; }
    footer .links a {
      color: #FFFFFF;
      margin: 0 12px;
      font-weight: 600;
    }
    footer .links a:hover { color: #FFFFFF; text-decoration: underline; }

    @media (max-width: 600px) {
      main { padding: 36px 20px; }
      h1 { font-size: 26px; }
      header { justify-content: center; }
      nav a { margin: 0 10px; }
    }
  </style>
</head>
<body>
  <header>
    <div class="brand"><a href="index.html"><span class="mark">⚓</span> Anchor: ADHD</a></div>
    <nav>
      <a href="privacy.html">Privacy</a>
      <a href="terms.html">Terms</a>
    </nav>
  </header>

  <main>
    <h1>Support</h1>
    <p class="intro">Need help? Email us at <a href="mailto:anchoradhd.app@gmail.com">anchoradhd.app@gmail.com</a> and we'll get back to you within 24 hours.</p>
  </main>

  <footer>
    <div class="links">
      <a href="privacy.html">Privacy Policy</a>
      <a href="terms.html">Terms of Service</a>
    </div>
    <div>© 2026 Anchor: ADHD</div>
  </footer>
</body>
</html>
